<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>오늘의 루틴 & 할 일 관리</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
        }

        body {
            background-color: #0b0f19;
            color: #f3f4f6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .app-container {
            background-color: #111827;
            width: 100%;
            max-width: 460px;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid #1f2937;
        }

        /* 헤더 디자인 */
        header {
            margin-bottom: 20px;
        }

        .date-title {
            font-size: 1.4rem;
            font-weight: 700;
            color: #38bdf8;
            margin-bottom: 6px;
        }

        /* 상단 한 줄 메모/다짐 영역 (실용성 추가) */
        .memo-box {
            background-color: #1f2937;
            border-left: 4px solid #38bdf8;
            padding: 10px 14px;
            border-radius: 4px 8px 8px 4px;
            margin-bottom: 25px;
        }

        #memo-input {
            width: 100%;
            background: none;
            border: none;
            color: #e5e7eb;
            font-size: 0.9rem;
            outline: none;
        }

        #memo-input::placeholder {
            color: #6b7280;
        }

        /* 입력창 영역 */
        .input-section {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        #todo-input {
            flex: 1;
            background-color: #1f2937;
            border: 1px solid #374151;
            border-radius: 10px;
            padding: 12px 14px;
            color: #ffffff;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s;
        }

        #todo-input:focus {
            border-color: #38bdf8;
        }

        #add-btn {
            background-color: #38bdf8;
            color: #0f172a;
            border: none;
            border-radius: 10px;
            padding: 0 18px;
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        #add-btn:hover {
            background-color: #7dd3fc;
        }

        /* 리스트 영역 */
        .todo-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-height: 350px;
            overflow-y: auto;
        }

        .todo-list::-webkit-scrollbar {
            width: 4px;
        }
        .todo-list::-webkit-scrollbar-thumb {
            background-color: #374151;
            border-radius: 10px;
        }

        .todo-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background-color: #1f2937;
            padding: 14px;
            border-radius: 10px;
            border: 1px solid #374151;
            gap: 10px;
        }

        /* 중요 아이템 강조 스타일 */
        .todo-item.important {
            border-color: #f59e0b; /* 황금색 테두리 */
            background-color: #1c1917;
        }

        .todo-left {
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1;
            cursor: pointer;
        }

        .checkbox {
            width: 18px;
            height: 18px;
            border: 2px solid #6b7280;
            border-radius: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .todo-text {
            font-size: 0.95rem;
            word-break: break-all;
        }

        /* 완료 상태 */
        .todo-item.completed {
            opacity: 0.5;
        }
        .todo-item.completed .checkbox {
            background-color: #10b981;
            border-color: #10b981;
        }
        .todo-item.completed .checkbox::after {
            content: '✓';
            color: #ffffff;
            font-size: 0.75rem;
            font-weight: bold;
        }
        .todo-item.completed .todo-text {
            text-decoration: line-through;
            color: #6b7280;
        }

        /* 우측 버튼들 */
        .todo-right {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .star-btn {
            background: none;
            border: none;
            color: #4b5563;
            font-size: 1.1rem;
            cursor: pointer;
        }
        .todo-item.important .star-btn {
            color: #f59e0b; /* 중요 표시되면 노란 별 */
        }

        .delete-btn {
            background: none;
            border: none;
            color: #4b5563;
            font-size: 1.2rem;
            cursor: pointer;
        }
        .delete-btn:hover {
            color: #ef4444;
        }

        .empty-msg {
            text-align: center;
            color: #4b5563;
            padding: 30px 0;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <header>
            <div class="date-title" id="date-el">2026년 00월 00일</div>
        </header>

        <div class="memo-box">
            <input type="text" id="memo-input" placeholder="오늘의 다짐이나 잊지 말아야 할 준비물 적기..." autocomplete="off">
        </div>

        <div class="input-section">
            <input type="text" id="todo-input" placeholder="할 일을 입력하세요..." autocomplete="off">
            <button id="add-btn" onclick="addTodo()">등록</button>
        </div>

        <ul class="todo-list" id="todo-list">
        </ul>
    </div>

    <script>
        const dateEl = document.getElementById('date-el');
        const todoInput = document.getElementById('todo-input');
        const todoList = document.getElementById('todo-list');
        const memoInput = document.getElementById('memo-input');

        let todos = JSON.parse(localStorage.getItem('routineTodos')) || [];
        
        // 상단 메모 불러오기 및 저장 기능
        memoInput.value = localStorage.getItem('todayMemo') || '';
        memoInput.addEventListener('input', () => {
            localStorage.setItem('todayMemo', memoInput.value);
        });

        // 날짜 표기
        function showDate() {
            const today = new Date();
            const dayNames = ['일', '월', '화', '수', '목', '금', '토'];
            dateEl.textContent = `${today.getFullYear()}년 ${today.getMonth() + 1}월 ${today.getDate()}일 (${dayNames[today.getDay()]})`;
        }

        // 리스트 그리기
        function render() {
            todoList.innerHTML = '';

            if (todos.length === 0) {
                todoList.innerHTML = '<li class="empty-msg">오늘 계획한 할 일이 없습니다.</li>';
                return;
            }

            // [정렬 조건 변경] 
            // 1순위: 미완료(위) vs 완료(아래)
            // 2순위: 중요도 높은 순(★) 위로 배치
            const sortedTodos = [...todos].sort((a, b) => {
                if (a.completed !== b.completed) {
                    return a.completed - b.completed; // false(0)가 true(1)보다 앞으로 옴 (미완료가 위로)
                }
                return b.important - a.important; // true(1)가 false(0)보다 앞으로 옴 (중요한 일이 위로)
            });

            sortedTodos.forEach((todo) => {
                // 원본 배열에서의 진짜 인덱스 찾기
                const originalIndex = todos.findIndex(t => t === todo);

                const li = document.createElement('li');
                li.className = `todo-item ${todo.completed ? 'completed' : ''} ${todo.important ? 'important' : ''}`;
                
                li.innerHTML = `
                    <div class="todo-left" onclick="toggleComplete(${originalIndex})">
                        <div class="checkbox"></div>
                        <span class="todo-text">${todo.text}</span>
                    </div>
                    <div class="todo-right">
                        <button class="star-btn" onclick="toggleImportant(${originalIndex})">★</button>
                        <button class="delete-btn" onclick="deleteTodo(${originalIndex})">&times;</button>
                    </div>
                `;
                todoList.appendChild(li);
            });
        }

        // 할 일 추가
        function addTodo() {
            const text = todoInput.value.trim();
            if (!text) return;

            todos.push({ text: text, completed: false, important: false });
            todoInput.value = '';
            save();
        }

        function toggleComplete(idx) {
            todos[idx].completed = !todos[idx].completed;
            save();
        }

        function toggleImportant(idx) {
            todos[idx].important = !todos[idx].important;
            save();
        }

        function deleteTodo(idx) {
            todos.splice(idx, 1);
            save();
        }

        function save() {
            localStorage.setItem('routineTodos', JSON.stringify(todos));
            render();
        }

        todoInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') addTodo();
        });

        showDate();
        render();
    </script>
</body>
</html>
